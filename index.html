<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">

<title>分箱掃描</title>

<style>

*{box-sizing:border-box;}

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
padding:10px;
}

.container{
width:100%;
max-width:500px;
margin:auto;
background:white;
padding:15px;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

h2{
text-align:center;
font-size:24px;
margin:10px 0 15px 0;
}

.box{
font-size:22px;
color:#007BFF;
text-align:center;
margin-bottom:10px;
font-weight:bold;
}

.stats{
display:flex;
justify-content:space-between;
font-size:16px;
margin-bottom:10px;
}

.stat{
background:#f7f7f7;
padding:8px;
border-radius:6px;
flex:1;
text-align:center;
margin:2px;
}

input{
width:100%;
padding:18px;
font-size:24px;
margin:10px 0;
text-align:center;
border-radius:8px;
border:1px solid #ccc;
}

input:focus{
outline:none;
border:2px solid #007BFF;
}

.log{
font-size:14px;
margin-top:10px;
height:140px;
overflow:auto;
background:#f7f7f7;
padding:10px;
border-radius:8px;
}

</style>

</head>

<body>

<div class="container">

<h2>📦 分箱掃描</h2>

<div class="box">
目前箱號：<span id="box">未設定</span>
</div>

<div class="stats">

<div class="stat">
📦總掃描<br>
<span id="total">0</span>
</div>

<div class="stat">
📦本箱<br>
<span id="boxcount">0</span>
</div>

<div class="stat">
📶狀態<br>
<span id="net">ONLINE</span>
</div>

</div>

<input id="scan" placeholder="掃描箱號或條碼">

<div class="log" id="log"></div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbzKP3cCH2WN1lQW27-UotFqNSa5WGq-V3ADSPu8Jc4Uo3suVQpEUdf0a49YkGwfxq9hqg/exec"

let currentBox=""
let buffer=[]
let totalCount=0
let boxCount=0

// 載入離線資料
let offline=JSON.parse(localStorage.getItem("offline")||"[]")

document.getElementById("scan").focus()

document.getElementById("scan")
.addEventListener("keypress",function(e){

if(e.key==="Enter"){

let code=this.value.trim()
this.value=""

if(code.startsWith("DECK-") || code.startsWith("ENG-")){

currentBox=code
boxCount=0

document.getElementById("box").innerText=currentBox
document.getElementById("boxcount").innerText=boxCount

log("切換箱號 "+code)

return
}

if(!currentBox){
alert("請先掃描箱號")
return
}

buffer.push({
barcode:code,
box:currentBox
})

totalCount++
boxCount++

updateStats()

log("掃描 "+code)

if(buffer.length>=5){
send()
}

}

})

function updateStats(){

document.getElementById("total").innerText=totalCount
document.getElementById("boxcount").innerText=boxCount

}

setInterval(function(){

if(buffer.length>0){
send()
}

},2000)

async function send(){

let data=[...buffer]

buffer=[]

try{

await fetch(API,{
method:"POST",
body:JSON.stringify(data)
})

document.getElementById("net").innerText="ONLINE"

}catch(e){

offline=offline.concat(data)
localStorage.setItem("offline",JSON.stringify(offline))

document.getElementById("net").innerText="OFFLINE"

log("⚠離線暫存 "+data.length)

}

}

// 補傳離線資料
setInterval(async function(){

if(offline.length==0) return

try{

await fetch(API,{
method:"POST",
body:JSON.stringify(offline)
})

log("📶補傳 "+offline.length)

offline=[]
localStorage.removeItem("offline")

document.getElementById("net").innerText="ONLINE"

}catch(e){

document.getElementById("net").innerText="OFFLINE"

}

},5000)

function log(t){

let div=document.getElementById("log")

div.innerHTML=t+"<br>"+div.innerHTML

}

</script>

</body>

</html>
